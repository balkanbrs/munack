name: Release VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: munack-release-vsix
          path: packages/munack-vscode/dist/*.vsix
